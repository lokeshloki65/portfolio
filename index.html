<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #121212;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('image/27269.jpg');
            background-position: center;
            background-size: cover;
            background-attachment: fixed;
            flex-direction: column;
        }

        /* Running Text */
        .running-text {
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            overflow: hidden;
            position: relative;
            height: 80px;
            white-space: nowrap;
        }

        .scroll-text {
            display: inline-block;
            white-space: nowrap;
            font-weight: bold;
            position: absolute;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            animation: scrollLeft 10s linear infinite, glow 2s infinite alternate;
            background: linear-gradient(100deg, #d1d0cf, #ebe8e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        @keyframes scrollLeft {
            0% { transform: translateX(90%); }
            100% { transform: translateX(-200%); }
        }

        .menu {
            position: fixed;
            left: -250px;
            top: 0;
            height: 100%;
            width: 280px;
            background: linear-gradient(135deg, #ff6a00, #000000);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            border-right: 3px solid rgba(255, 255, 255, 0.3);
            box-shadow: 5px 0 35px rgba(255, 255, 255, 0.1);
            border-radius: 0 25px 25px 0;
            transition: left 0.5s ease-in-out;
        }

        .menu:hover {
            left: 0;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid white;
            margin-bottom: 30px;
            transition: transform 0.3s;
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .profile-img:hover {
            transform: scale(1.1);
        }

        .menu a {
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 3px 35px;
            margin: 10px 0;
            border-radius: 100px;
            width: 85%;
            text-align: center;
            background: linear-gradient(135deg, #0774e9, #1c58c0);
            box-shadow: 3px 3px 15px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .menu a:hover {
            transform: scale(1.1);
            background: linear-gradient(135deg, #2575fc, #6a11cb);
            box-shadow: 5px 5px 20px rgba(0, 0, 0, 0.3);
        }

        .details {
            text-align: center;
            margin-top: 20px;
        }

        .details h2 {
            font-size: 40px;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #ff6a00, #ee0979);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 0.6s infinite alternate;
        }

        .details p {
            font-size: 20px;
            margin-bottom: 15px;
            background: linear-gradient(360deg, #eae8e7, #eae8e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); }
        }

        .profile-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .profile-container img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 5px solid rgb(255, 255, 255);
        }

        /* Left Arrow Styling */
        .left-arrow {
            position: fixed;
            left: 35px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 70px;
            text-decoration: none;
            font-weight: bold;
            color: transparent;
            background: linear-gradient(90deg, #ff6a00, #2575fc);
            -webkit-background-clip: text;
            animation: blink 0.2s infinite alternate;
            transition: transform 0.3s, color 0.3s;
        }

        /* Blinking effect */
        @keyframes blink {
            0% { opacity: 10; }
            100% { opacity: 0.1; }
        }

        /* Hover effect */
        .left-arrow:hover {
            transform: scale(1.2);
            color: white;
        }

    </style>
</head>

</body>
